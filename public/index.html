<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BB45 — Blue Bay</title>
  <style>
    html, body { margin: 0; height: 100%; background: #0c1014; overflow: hidden; }
    #gl, #overlay { position: fixed; inset: 0; display: block; width: 100vw; height: 100vh; }
    #gl { z-index: 0; }
    #overlay { z-index: 1; }
    .panel {
      position: fixed; z-index: 2; color: #eef4f7;
      font: 13px/1.45 -apple-system, "Segoe UI", system-ui, sans-serif;
      background: rgba(12, 20, 26, 0.55); backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.10); border-radius: 12px; padding: 12px 14px;
    }
    #wx { top: 14px; left: 14px; min-width: 150px; }
    #see { top: 14px; right: 14px; min-width: 190px; }
    #cal { bottom: 14px; left: 14px; min-width: 170px; display: none; }
    #toggles { position: fixed; z-index: 2; top: 14px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; }
    #toggles button {
      cursor: pointer; color: #eef4f7; background: rgba(12, 20, 26, 0.55); backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.14); border-radius: 8px; padding: 6px 12px;
      font: 12px -apple-system, "Segoe UI", system-ui, sans-serif;
    }
    #toggles button.on { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.40); }
    .panel h2 { margin: 0 0 6px; font-size: 12px; letter-spacing: .04em; text-transform: uppercase; opacity: .7; }
    .panel .row { display: flex; justify-content: space-between; gap: 14px; }
    #see input[type=range], #cal input[type=range] { width: 100%; }
    .btns { display: flex; gap: 8px; margin-top: 8px; }
    .btns button {
      flex: 1; cursor: pointer; color: #eef4f7; background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14); border-radius: 8px; padding: 5px 0; font-size: 12px;
    }
    #tooltip {
      position: fixed; z-index: 3; pointer-events: none; opacity: 0; max-width: 240px;
      transition: opacity 0.35s ease;
      color: #eef4f7; font: 12px/1.4 -apple-system, "Segoe UI", system-ui, sans-serif;
      background: rgba(10, 16, 20, 0.86); border: 1px solid rgba(255,255,255,0.14);
      border-radius: 10px; padding: 8px 10px;
    }
    #tooltip b { font-size: 13px; }
    #tooltip .hd { color: #ffd27a; }
  </style>
</head>
<body>
  <canvas id="gl"></canvas>
  <canvas id="overlay"></canvas>

  <section id="wx" class="panel">
    <h2>Weather</h2>
    <div id="wx-body">loading…</div>
  </section>

  <section id="see" class="panel">
    <h2>View</h2>
    <div id="verdict">—</div>
    <div class="row" style="margin-top:8px"><span>Sightline</span><span id="sl-val">— km</span></div>
    <input id="sl" type="range" min="2" max="200" step="1" value="40">
    <div class="btns">
      <button id="drift">⏸ Drift</button>
      <button id="livewx">◉ Live wx</button>
    </div>
    <div class="btns">
      <button id="live">📡 Go live</button>
    </div>
    <div class="btns">
      <button id="view-toggle">🔭 Full sweep</button>
    </div>
    <div class="row" style="margin-top:6px"><span>Ships</span><span id="ships-status">simulated</span></div>
  </section>

  <section id="cal" class="panel">
    <h2>Calibration</h2>
    <div class="row"><span>Size</span><span id="gain-val">—</span></div>
    <input id="gain" type="range" min="0.0004" max="0.005" step="0.0001" value="0.0016">
    <div class="row" style="margin-top:6px"><span>Spread</span><span id="spread-val">—</span></div>
    <input id="spread" type="range" min="0" max="0.98" step="0.02" value="0.9">
    <div class="row" style="margin-top:6px"><span>Haze</span><span id="haze-val">—</span></div>
    <input id="haze" type="range" min="0" max="1" step="0.05" value="0.4">
  </section>

  <div id="toggles">
    <button id="t-wx" data-on="true">Weather</button>
    <button id="t-cal" data-on="false">Calibration</button>
    <button id="t-lines" data-on="true">Lines</button>
    <button id="t-view" data-on="true">View</button>
  </div>

  <div id="tooltip"></div>

  <script type="importmap">
  { "imports": { "three": "./vendor/three/three.module.js" } }
  </script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
